<style>
    body {
      background-color: #0F172A; /* Override with dark navy from user prompt */
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .mood-chip {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }
    .mood-chip:hover {
      border-color: #22C55E;
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .floating {
      animation: float 4s ease-in-out infinite;
    }
    .gradient-text {
      background: linear-gradient(135deg, #4be277 0%, #7bd0ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

<body class="text-on-background min-h-screen flex flex-col">
<!-- Top Navigation (Shell) -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl h-16 flex items-center justify-between px-container-padding-mobile max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl">menu</span>

</div>
<div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant">
<img class="w-full h-4 lg:h-8 object-cover" data-alt="A high-fidelity minimalist user profile avatar for a premium music app, featuring a sleek abstract 3D shape with emerald and navy glass textures, softly lit from the side to create depth and a sophisticated digital aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdiH7pY3GKVEfzBWlLrzB5JwVlEHghC94OWlYf2ybwfxetfRl-eNIRJkZowDGLdr_sRZWOuNla55fvmon67uIMFNuTdHgJ8Efxht9XNutK5l-9HqhpSb8RDLa9kyv2Fl4Wl89JnIC0auFHSTB_y_-QOwoi153l_AXTj8tQ4G9OmDluTXn0165eyi5FRmUPY8_otgrzP1lWn-9P4t9uBnoC0078-ecBtZJ7Rc6alDJ_CV-oiTS1NhJ2t6fHOUiOHCWXBm2tun5TPps"/>
</div>
</header>
<main class="flex-1 flex flex-col pt-24 pb-20 px-container-padding-mobile max-w-lg mx-auto w-full relative">
<!-- Mood Gateway Section -->
<section class="relative mb-12">
<div class="flex items-center justify-between mb-4">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">How are you feeling?</h2>
</div>
<!-- Tooltip Indicator -->
<div class="absolute -top-10 left-1/2 -translate-x-1/2 z-10 px-4 py-2 bg-primary-container text-on-primary-container rounded-lg shadow-lg flex items-center gap-2 animate-bounce">
<span class="font-body-sm text-body-sm font-bold whitespace-nowrap">Start here — pick how you feel</span>
<div class="absolute -bottom-1 left-1/2 -translate-x-1/2 w-3 h-3 bg-primary-container rotate-45"></div>
</div>
<div class="flex flex-wrap gap-3">
<button class="mood-chip px-6 py-3 rounded-full flex items-center gap-2 group active:scale-95">
<span class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">bolt</span>
<span class="font-body-sm text-body-sm">Energetic</span>
</button>
<button class="mood-chip px-6 py-3 rounded-full flex items-center gap-2 group active:scale-95">
<span class="material-symbols-outlined text-secondary group-hover:scale-110 transition-transform">spa</span>
<span class="font-body-sm text-body-sm">Calm</span>
</button>
<button class="mood-chip px-6 py-3 rounded-full flex items-center gap-2 group active:scale-95">
<span class="material-symbols-outlined text-tertiary group-hover:scale-110 transition-transform">nightlight</span>
<span class="font-body-sm text-body-sm">Focused</span>
</button>
<button class="mood-chip px-6 py-3 rounded-full flex items-center gap-2 group active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant group-hover:scale-110 transition-transform">mood</span>
<span class="font-body-sm text-body-sm">Happy</span>
</button>
</div>
</section>
<!-- Empty State Content -->
<div class="flex-1 flex flex-col items-center justify-center text-center space-y-8 py-8">
<!-- Illustration Area -->
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Background Glow -->
<div class="absolute inset-0 bg-primary/10 blur-[60px] rounded-full"></div>
<!-- Sun/Clock Graphic -->

</p>
<p class="font-caption text-caption text-outline italic">
          We’re analyzing your vibe to create the perfect morning soundscape.
        </p>
</div>

<button class="mt-8 px-8 py-4 bg-primary text-on-primary font-bold rounded-xl active:scale-95 transition-transform flex items-center gap-3 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">play_arrow</span>
<span class="font-body-md text-body-md">Explore Library While Waiting</span>
</button>
</div>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center py-3 px-6 pb-safe bg-surface-container-lowest/90 backdrop-blur-lg border-t border-outline-variant z-50">
<!-- Home Active -->
<a class="flex flex-col items-center justify-center text-primary font-bold active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>

</a>

</a>

<span class="material-symbols-outlined">library_music</span>
<span class="font-label-caps text-label-caps mt-1">Library</span>
</a>

<script>
    // Subtle interactivity for the empty state
    document.addEventListener('mousemove', (e) => {
      const glow = document.querySelector('.bg-primary\\/10');
      if (glow) {
        const x = (e.clientX / window.innerWidth - 0.5) * 30;
        const y = (e.clientY / window.innerHeight - 0.5) * 30;
        glow.style.transform = `translate(${x}px, ${y}px)`;
      }
    });

    // Close tooltip on chip click
    const chips = document.querySelectorAll('.mood-chip');
    const tooltip = document.querySelector('.bg-primary-container');
    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        tooltip.style.opacity = '0';
        tooltip.style.transform = 'translateY(10px) translateX(-50%)';
        setTimeout(() => tooltip.style.display = 'none', 300);
      });
    });
  </script>
</body></html>
