# MoodAI Spotify — Render Blueprint (Phase 3 production stack)
# Docs: docs/production-runbook.md
# Validate: render blueprints validate render.yaml

databases:
  - name: moodai-db
    plan: basic-256mb
    region: oregon
    databaseName: discovery
    user: app

services:
  - type: keyvalue
    name: moodai-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: moodai-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements-prod.txt
    startCommand: cd phases/phase-3 && uvicorn app.main:create_app --factory --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moodai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: moodai-redis
          type: keyvalue
          property: connectionString
      - key: DATASET_VERSION
        value: v1.1.0
      - key: EXCEL_SOURCE_PATH
        value: data/source/Music_Data.csv
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_API_KEY
        sync: false
      - key: MOOD_GATEWAY_ENABLED
        value: "true"
      - key: VISUAL_SEARCH_ENABLED
        value: "true"
      - key: PUSH_NOTIFICATIONS_ENABLED
        value: "false"
      - key: SMART_MOOD_DEFAULT_ENABLED
        value: "true"
      - key: HOME_CACHE_TTL_SECONDS
        value: "60"
      - key: ADAPTIVE_DROP_SIZE
        value: "10"
      - key: DROP_PARTITIONS
        value: "4"
      - key: LLM_TOKEN_BUDGET_PER_DAY
        value: "5000"

  - type: cron
    name: moodai-daily-drop
    runtime: python
    region: oregon
    schedule: "0 6 * * *"
    buildCommand: pip install -r requirements-prod.txt
    startCommand: python phases/phase-1/scripts/generate_drop.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moodai-db
          property: connectionString
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_API_KEY
        sync: false

  - type: cron
    name: moodai-llm-prewarm
    runtime: python
    region: oregon
    schedule: "0 */6 * * *"
    buildCommand: pip install -r requirements-prod.txt
    startCommand: python phases/phase-2/scripts/llm_prewarm.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moodai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: moodai-redis
          type: keyvalue
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1

  - type: cron
    name: moodai-candidate-prewarm
    runtime: python
    region: oregon
    schedule: "30 */6 * * *"
    buildCommand: pip install -r requirements-prod.txt
    startCommand: python phases/phase-3/scripts/candidate_prewarm.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moodai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: moodai-redis
          type: keyvalue
          property: connectionString
