# Railway cron: daily discovery drop (06:00 UTC)
# Service settings → Config file path: railway/cron-daily-drop.toml

[build]
builder = "RAILPACK"
buildCommand = "pip install -r requirements-prod.txt"

[deploy]
startCommand = "python phases/phase-1/scripts/generate_drop.py"
cronSchedule = "0 6 * * *"
restartPolicyType = "NEVER"
