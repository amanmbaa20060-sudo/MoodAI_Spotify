services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: discovery
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
